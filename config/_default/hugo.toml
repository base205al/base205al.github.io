  "linkedin"
  ,"bluesky"
  ,"mastodon"
  ,"twitter"
  ,"facebook"
]

[params.ananke.social.github]
username = "base205al"
[params.ananke.social.bluesky]
username = "base205al.bsky.social"
[params.ananke.social.mastodon]
username = "base205al"
instance = "mastodon.social"
profilelink = "https://mastodon.social/@base205al"
[params.ananke.social.twitter]
username = "base205al"
[params.ananke.social.facebook]
username = "people/BASE-Birmingham-Area-Software-Enthusiasts/61575048102778/"
[params.ananke.social.youtube]
username = "BASE205AL"
[params.ananke.social.discord]
username = "4mV77At86e"


[params.ananke.social.linkedin]
username = "74923663"
profilelink = "https://www.linkedin.com/company/74923663"

[params.ananke.social.networks.linkedin]
slug = "linkedin"
label = "LinkedIn"
color = "#0077b5"
profile = "https://www.linkedin.com/company/%s"
icon = "linkedin" # font awesome brand icon name
# The theme default uses the deprecated /shareArticle endpoint, which LinkedIn
# no longer honors. /sharing/share-offsite/ is the current working endpoint;
# it reads title/description/image from the page's Open Graph tags, so only
# `url` is passed.
link = "https://www.linkedin.com/sharing/share-offsite/"
# Hugo deep-merges config maps from theme modules, so the theme's default
# particles (title/summary/source/mini) would merge back in. _merge = "none"
# takes this table verbatim from our config instead.
[params.ananke.social.networks.linkedin.particles]
_merge = "none"
url = "permalink"

# The theme ships no `link`/`particles` for Mastodon, so its share button
# renders a broken "%!s(<nil>)?" URL. Mastodon is federated with no universal
# share endpoint; the convention is to route through your own instance's
# /share?text= composer. `text = permalink` puts the post URL in the composer.
[params.ananke.social.networks.mastodon]
link = "https://mastodon.social/share"
[params.ananke.social.networks.mastodon.particles]
text = "permalink"

[services]
  [services.rss]
    limit = 42

[outputFormats.RSS]
basename = "feed"
