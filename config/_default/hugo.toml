[module]
[[module.imports]]
path = 'github.com/KKKZOZ/hugo-admonitions'
[[module.imports]]
disable = false
ignoreConfig = false
ignoreImports = false
path = 'github.com/gohugo-ananke/ananke/v2'

[services.disqus]
  shortname = 'base205al'
[params]
  commentoEnable = false
#  date_format = '2006-01-02T15:04:05Z07:00'
  date_format = '2006-01-02'
  background_color_class = "bg-gray"
  read_more_copy = "Read more about this entry"
  show_reading_time = true
  show_toc = true
  show_share_buttons = true
  body_classes = "sans-serif bg-near-white"
  site_logo = "/images/BASE_Logo.png"
  # Site-wide default og:image (used by Hugo's opengraph template when a page
  # sets no featured_image / images of its own). Gives LinkedIn, etc. a
  # thumbnail for the share preview card. Pages can override via front matter.
  images = ["images/BASE_social_card.png"]


